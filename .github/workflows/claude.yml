name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  auto-review:
    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == 'dvclinear' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: pr-review-auto-${{ github.event.pull_request.head.sha }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Resolve PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

          ISSUE_ID=$(printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | grep -oE '\b[A-Z][A-Z0-9]+-[0-9]+\b' | head -n 1 || true)
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"

          RETRY_LABEL=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
            --jq '[.[].name | select(startswith("review-retry-"))] | sort | last // "none"')
          if [ "$RETRY_LABEL" = "none" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            echo "count=${RETRY_LABEL##*-}" >> "$GITHUB_OUTPUT"
            echo "current_label=$RETRY_LABEL" >> "$GITHUB_OUTPUT"
          fi

      - name: Set review status to pending
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=pending \
            -f context="PR Review / claude" \
            -f description="Claude is reviewing this PR..." \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Collect CI context
        if: steps.context.outputs.skip != 'true'
        id: ci
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          CHECKS_JSON=$(gh api repos/${{ github.repository }}/commits/$SHA/status --jq '{state: .state, statuses: [.statuses[] | {context, state, description}]}' 2>/dev/null || echo '{}')
          CHECK_STATE=$(printf '%s' "$CHECKS_JSON" | jq -r '.state // "unknown"')
          FAILED_CHECKS=$(printf '%s' "$CHECKS_JSON" | jq -r '[.statuses[]? | select(.state == "failure" || .state == "error") | .context] | join(", ")')
          echo "conclusion=$CHECK_STATE" >> "$GITHUB_OUTPUT"
          echo "failed_jobs=$FAILED_CHECKS" >> "$GITHUB_OUTPUT"

      - name: Initialize review decision
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3'
        run: |
          cat > /tmp/claude-review-decision.json <<'EOF'
          {
            "issue_id": "",
            "verdict": "in_review",
            "reason": "",
            "summary": "",
            "retry_increment": false
          }
          EOF

      - name: Skip if max retries reached
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count == '3'
        run: |
          echo "Max retries (3) reached. Skipping automated review."
          echo "A human should review PR #${{ steps.context.outputs.pr_number }}."

      - name: Run Claude Code PR review
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "Missing CLAUDE_CODE_OAUTH_TOKEN secret for this repository/workflow context." >&2
            exit 1
          fi
          exec node -e 'process.exit(0)'

      - name: Claude review
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.context.outputs.pr_number }}
            LINEAR ISSUE ID: ${{ steps.context.outputs.issue_id }}
            CI conclusion: ${{ steps.ci.outputs.conclusion }}
            Failed CI jobs: ${{ steps.ci.outputs.failed_jobs }}
            Current retry count: ${{ steps.context.outputs.count }}
            Current retry label: ${{ steps.context.outputs.current_label }}

            Review this PR like a senior reviewer for cmux, a macOS Swift/AppKit app
            with Ghostty integration.

            ## Instructions

            1. Review the diff for correctness, regressions, security, and testing gaps.
            2. Leave GitHub review feedback for actionable issues.
            3. Do not call Linear directly. The workflow will handle Linear updates.
            4. Before finishing, overwrite `/tmp/claude-review-decision.json` with a
               single JSON object using exactly this schema:
               {
                 "issue_id": "ABC-123 or empty string",
                 "verdict": "todo" | "in_review",
                 "reason": "one short sentence",
                 "summary": "one short paragraph for the Linear comment",
                 "retry_increment": true | false
               }
            5. Set `verdict` to `todo` only for clear blocking issues.
            6. Set `retry_increment` to `true` only when `verdict` is `todo`.
            7. Use the provided `LINEAR ISSUE ID` if non-empty; only leave `issue_id`
               empty if no linked Linear ticket exists.

            ## cmux-specific review focus

            - `AGENTS.md` build/test policy: agents should use tagged debug builds and
              should not rely on fake local test evidence.
            - Typing-latency-sensitive paths called out in `AGENTS.md` such as
              `WindowTerminalHostView.hitTest()`, `TabItemView`, and
              `TerminalSurface.forceRefresh()`.
            - Localization policy: all user-facing strings must be localized.
            - Shortcut policy: new cmux-owned shortcuts must be wired through settings,
              config, and docs.
            - Socket threading and focus policies: telemetry commands off-main by default,
              and non-focus socket commands must not steal app focus.
            - Submodule safety: if a submodule pointer changed, ensure the submodule
              workflow is coherent and not orphaning commits.

            ## What counts as SUBSTANTIVE vs nitpick

            SUBSTANTIVE (`verdict = "todo"`):
            - Behavioral regression or correctness bug
            - Security issue or secret-handling mistake
            - Missing validation or missing error handling with real user impact
            - Test coverage gap for risky logic changes
            - Violation of the latency-sensitive, focus, threading, localization, or
              shortcut policies documented in `AGENTS.md`
            - CI failure plausibly caused by the PR

            Nitpick (leave in In Review):
            - Small style or naming preference
            - Non-blocking refactor suggestion
            - Documentation polish that is not required for correctness

            When in doubt, leave `verdict` as `in_review`.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh:*),Bash(cat:*),Bash(printf:*),Bash(jq:*)"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

      - name: Apply deterministic review outcome
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          ISSUE_ID_FALLBACK: ${{ steps.context.outputs.issue_id }}
          CURRENT_RETRY_LABEL: ${{ steps.context.outputs.current_label }}
          CURRENT_RETRY_COUNT: ${{ steps.context.outputs.count }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          test -f /tmp/claude-review-decision.json
          jq -e '.issue_id != null and .verdict != null and .reason != null and .summary != null and .retry_increment != null' /tmp/claude-review-decision.json >/dev/null

          ISSUE_ID=$(jq -r '.issue_id' /tmp/claude-review-decision.json)
          VERDICT=$(jq -r '.verdict' /tmp/claude-review-decision.json)
          REASON=$(jq -r '.reason' /tmp/claude-review-decision.json)
          SUMMARY=$(jq -r '.summary' /tmp/claude-review-decision.json)
          RETRY_INCREMENT=$(jq -r '.retry_increment' /tmp/claude-review-decision.json)

          if [ -z "$ISSUE_ID" ] || [ "$ISSUE_ID" = "null" ]; then
            ISSUE_ID="$ISSUE_ID_FALLBACK"
          fi

          case "$VERDICT" in
            todo|in_review) ;;
            *)
              echo "Invalid verdict in /tmp/claude-review-decision.json: $VERDICT" >&2
              exit 1
              ;;
          esac

          if [ -z "$ISSUE_ID" ]; then
            echo "No linked Linear issue ID found; skipping Linear update."
            exit 0
          fi

          ISSUE_SEARCH_PAYLOAD=$(jq -n --arg issue "$ISSUE_ID" '{
            query: "query($issue: String!) { issueSearch(filter: { identifier: { eq: $issue } }) { nodes { id identifier state { name } team { states { nodes { id name } } } } } }",
            variables: { issue: $issue }
          }')
          ISSUE_SEARCH_JSON=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$ISSUE_SEARCH_PAYLOAD")

          ISSUE_UUID=$(printf '%s' "$ISSUE_SEARCH_JSON" | jq -r '.data.issueSearch.nodes[0].id // empty')
          if [ -z "$ISSUE_UUID" ]; then
            gh pr comment "$PR_NUMBER" --body "Claude review found an issue linked to \`$ISSUE_ID\`, but Linear lookup failed."
            exit 1
          fi

          TARGET_STATE_NAME="In Review"
          if [ "$VERDICT" = "todo" ]; then
            TARGET_STATE_NAME="Todo"
          fi

          if [ "$VERDICT" = "todo" ] && [ "$CURRENT_RETRY_COUNT" = "2" ]; then
            TARGET_STATE_NAME="In Review"
            REASON="$REASON Human intervention required after 3 automated retries."
          fi

          TARGET_STATE_ID=$(printf '%s' "$ISSUE_SEARCH_JSON" | jq -r --arg name "$TARGET_STATE_NAME" '.data.issueSearch.nodes[0].team.states.nodes[] | select(.name == $name) | .id' | head -n 1)
          if [ -z "$TARGET_STATE_ID" ]; then
            gh pr comment "$PR_NUMBER" --body "Claude review found an issue linked to \`$ISSUE_ID\`, but could not find Linear state \`$TARGET_STATE_NAME\`."
            exit 1
          fi

          UPDATE_PAYLOAD=$(jq -n --arg issue_id "$ISSUE_UUID" --arg state_id "$TARGET_STATE_ID" '{
            query: "mutation($issue_id: String!, $state_id: String!) { issueUpdate(id: $issue_id, input: { stateId: $state_id }) { success } }",
            variables: { issue_id: $issue_id, state_id: $state_id }
          }')
          UPDATE_JSON=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_PAYLOAD")
          printf '%s' "$UPDATE_JSON" | jq -e '.data.issueUpdate.success == true' >/dev/null

          COMMENT_BODY=$(printf '## Claude Review Summary\n\n%s\n\nVerdict: `%s`\nReason: %s\nPR: %s' "$SUMMARY" "$VERDICT" "$REASON" "$PR_URL")
          COMMENT_PAYLOAD=$(jq -n --arg issue_id "$ISSUE_UUID" --arg body "$COMMENT_BODY" '{
            query: "mutation($issue_id: String!, $body: String!) { commentCreate(input: { issueId: $issue_id, body: $body }) { success } }",
            variables: { issue_id: $issue_id, body: $body }
          }')
          curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$COMMENT_PAYLOAD" | jq -e '.data.commentCreate.success == true' >/dev/null

          if [ "$VERDICT" = "todo" ] && [ "$TARGET_STATE_NAME" = "Todo" ] && [ "$RETRY_INCREMENT" = "true" ]; then
            if [ -n "${CURRENT_RETRY_LABEL:-}" ]; then
              gh api -X DELETE repos/${{ github.repository }}/issues/$PR_NUMBER/labels/$CURRENT_RETRY_LABEL || true
            fi
            NEXT_RETRY=$((CURRENT_RETRY_COUNT + 1))
            gh api -X POST repos/${{ github.repository }}/issues/$PR_NUMBER/labels -f "labels[]=review-retry-$NEXT_RETRY"
          fi

      - name: Set review status to success
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="PR Review / claude" \
            -f description="Claude review complete" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Set review status to failure
        if: steps.context.outputs.skip != 'true' && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=failure \
            -f context="PR Review / claude" \
            -f description="Claude review failed" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  claude:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
