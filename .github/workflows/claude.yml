name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  auto-review:
    if: >
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login == 'dvclinear' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: pr-review-auto-${{ github.event.pull_request.head.sha }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Resolve PR context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

          RETRY_LABEL=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels \
            --jq '[.[].name | select(startswith("review-retry-"))] | sort | last // "none"')
          if [ "$RETRY_LABEL" = "none" ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            echo "count=${RETRY_LABEL##*-}" >> "$GITHUB_OUTPUT"
            echo "current_label=$RETRY_LABEL" >> "$GITHUB_OUTPUT"
          fi

      - name: Set review status to pending
        if: steps.context.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=pending \
            -f context="PR Review / claude" \
            -f description="Claude is reviewing this PR..." \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Collect CI context
        if: steps.context.outputs.skip != 'true'
        id: ci
        run: |
          echo "conclusion=not-run-in-this-workflow" >> "$GITHUB_OUTPUT"
          echo "failed_jobs=" >> "$GITHUB_OUTPUT"

      - name: Skip if max retries reached
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count == '3'
        run: |
          echo "Max retries (3) reached. Skipping automated review."
          echo "A human should review PR #${{ steps.context.outputs.pr_number }}."

      - name: Run Claude Code PR review
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ steps.context.outputs.pr_number }}
            CI conclusion: ${{ steps.ci.outputs.conclusion }}
            Failed CI jobs: ${{ steps.ci.outputs.failed_jobs }}
            Current retry count: ${{ steps.context.outputs.count }}
            Current retry label: ${{ steps.context.outputs.current_label }}

            You are reviewing a PR created by Codex Symphony as part of an automated
            development workflow on the cmux repo (macOS Swift/AppKit app with Ghostty
            integration). Your job is to review the code AND decide what happens to the
            linked Linear ticket.

            ## Instructions

            1. Review the PR diff for correctness, regressions, security, and testing gaps.
            2. Check the CI conclusion above.
            3. Extract the Linear issue ID from the PR title or body. The prefix may vary,
               but prefer patterns like `ABC-123`. If multiple issue IDs are present, use
               the primary one referenced by the PR title first.
            4. If no Linear issue ID is found, post GitHub review feedback only.
               Do NOT attempt Linear API calls.
            5. Check the retry count. If moving the ticket back would make this retry 3,
               move the ticket to `In Review` instead and comment that human intervention
               is needed after 3 automated retries.
            6. Otherwise, decide and act:

               - If CI FAILED: Move the Linear ticket to `Todo` and post a comment
                 summarizing the CI failure. Use `gh` to inspect failed job details/logs
                 if the summary above is insufficient.
               - If CI passed but you found SUBSTANTIVE issues: Move the Linear ticket
                 to `Todo` and post a comment with your findings and proposed fixes.
               - If CI passed and the code is clean OR you only have minor nitpicks:
                 Leave the ticket in `In Review`. Post review comments on the PR for
                 human review.

            7. ALWAYS post a summary comment on the Linear ticket when an issue ID is
               available, regardless of outcome. Include: CI status, review verdict
               (clean, nitpicks, substantive, failed), and a link to the PR.

            This repository is cmux, a macOS Swift/AppKit app with Ghostty integration.
            Read AGENTS.md and relevant local docs before commenting when they materially affect the review.

            ## cmux-specific review focus

            Pay particular attention to:

            - `AGENTS.md` build/test policy: agents should use tagged debug builds and
              should not rely on fake local test evidence.
            - Typing-latency-sensitive paths called out in `AGENTS.md` such as
              `WindowTerminalHostView.hitTest()`, `TabItemView`, and
              `TerminalSurface.forceRefresh()`.
            - Localization policy: all user-facing strings must be localized.
            - Shortcut policy: new cmux-owned shortcuts must be wired through settings,
              config, and docs.
            - Socket threading and focus policies: telemetry commands off-main by default,
              and non-focus socket commands must not steal app focus.
            - Submodule safety: if a submodule pointer changed, ensure the submodule
              workflow is coherent and not orphaning commits.

            ## What counts as SUBSTANTIVE vs nitpick

            SUBSTANTIVE (move to Todo):
            - Behavioral regression or correctness bug
            - Security issue or secret-handling mistake
            - Missing validation or missing error handling with real user impact
            - Test coverage gap for risky logic changes
            - Violation of the latency-sensitive, focus, threading, localization, or
              shortcut policies documented in `AGENTS.md`
            - CI failure plausibly caused by the PR

            Nitpick (leave in In Review):
            - Small style or naming preference
            - Non-blocking refactor suggestion
            - Documentation polish that is not required for correctness

            When in doubt, err on the side of leaving the ticket in `In Review`. Only
            move it back to `Todo` for clear issues that should block merge.

            ## After deciding, update the retry label

            If you moved the ticket to `Todo`, update the PR retry label using `gh`:
            - Remove the current retry label, if any
            - Add `review-retry-N`, where `N = current retry count + 1`

            ## Linear API

            Use `curl` to interact with Linear. The API key is available as `$LINEAR_API_KEY`.

            To find the issue by identifier:
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query": "{ issueSearch(filter: { identifier: { eq: \"ABC-123\" } }) { nodes { id identifier state { name } team { states { nodes { id name } } } } } }"}'

            To update issue state:
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query": "mutation { issueUpdate(id: \"ISSUE_UUID\", input: { stateId: \"STATE_UUID\" }) { success issue { identifier state { name } } } }"}'

            To post a comment:
            curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"query": "mutation { commentCreate(input: { issueId: \"ISSUE_UUID\", body: \"Your comment here\" }) { success } }"}'

            If any Linear API call fails, post a comment on the PR noting the failure so
            it is visible and not silently lost.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(curl:*),Bash(gh:*)"
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

      - name: Set review status to success
        if: steps.context.outputs.skip != 'true' && steps.context.outputs.count != '3' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f context="PR Review / claude" \
            -f description="Claude review complete" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Set review status to failure
        if: steps.context.outputs.skip != 'true' && failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=failure \
            -f context="PR Review / claude" \
            -f description="Claude review failed" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
